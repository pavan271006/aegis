[alembic]
script_location = migrations
prepend_sys_path = .
# DB URL comes from the app settings at runtime (see migrations/env.py); this is
# only a fallback for local CLI use.
sqlalchemy.url = postgresql+psycopg2://aegis:aegis@localhost:5432/aegis

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
